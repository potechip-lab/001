# .github/workflows/update.yml
#
# 【配置場所】リポジトリルートに .github/workflows/ フォルダを作り、
# このファイルを update.yml という名前で保存してください。
#
# 【動作】
#   - 毎日 06:00 JST（= UTC 21:00）に自動実行
#   - GitHub の Actions タブから「Run workflow」で手動実行も可能

name: Update News Data

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 06:00 JST
  workflow_dispatch:         # 手動トリガー

permissions:
  contents: write            # data.json をリポジトリにプッシュするために必要

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ニュース取得スクリプトを実行
        run: python fetch_news.py

      - name: data.json をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 差分がある場合のみコミット
          git diff --staged --quiet || \
            git commit -m "📰 ニュースデータ更新 $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')"
          git push
